name: Build Windows app

on:
  workflow_dispatch:

# Needed to publish/update the GitHub Release below — the default GITHUB_TOKEN is read-only
# unless a workflow explicitly asks for write access.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      # Root crate (`src/`) has no `[workspace]` tying it to `app/src-tauri` — `cargo test`
      # inside src-tauri below only tests that crate, never this one, so its 100+ tests (the
      # `.pak`/`._ximg`/`.xmot` format layer, including `install_patches`'s full-merge logic)
      # had never actually run in CI at all. Unlike src-tauri, this crate builds fine in the dev
      # sandbox too (see Cargo.toml's own notes on why: no windows-sys/eframe/rfd), so this step
      # is redundant with local runs but is the only place a forgotten local test run would still
      # get caught before a release.
      - name: Test root crate
        run: cargo test

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      # remote.rs embeds `../dist` into the binary at compile time (`include_dir!`), so it must
      # exist before `src-tauri` compiles AT ALL — including for `cargo test` below, which
      # otherwise ran before the frontend was ever built. `npx tauri build` below rebuilds this
      # again via its own beforeBuildCommand; that's a harmless, idempotent re-run.
      - name: Build frontend
        working-directory: app
        run: npm run build

      # The sandbox this project is normally developed in can't compile src-tauri at all (no
      # dlltool/MinGW binutils) — this is the ONLY place `logic.rs`'s tests (settings
      # round-trip, review-status, etc.) actually run. Catches the exact class of bug that
      # shipped once already: a field present in the JSON/TS side but silently dropped by the
      # Rust `AppSettings` struct (see `ai_regenerate_survives_the_real_json_round_trip`).
      - name: Test Tauri backend
        working-directory: app/src-tauri
        run: cargo test

      - name: Build Tauri app
        working-directory: app
        run: npx tauri build

      # mimicry-helper.exe is a separate GPL-3.0 binary, deliberately its own repo/build so this
      # crate never links GPL code (see src/content.rs) — but that meant a "just download the
      # portable exe" user got a broken Models/Animations tab with no explanation (real incident,
      # 2026-07-20: "mimicry-helper.exe not found at Desktop\mimicry-helper.exe"). Fetches the
      # latest successful build from that sibling repo's own CI (public repo, same org) and drops
      # it next to risenlab-ui.exe — content.rs's helper_exe_path() already checks "next to this
      # binary" first, so no code change needed, just get the file into the same folder.
      - name: Fetch mimicry-helper.exe from its own repo's CI
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list --repo UniLinkIF/mimicry-helper --workflow=build-and-test.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$run_id" ]; then
            echo "::error::No successful mimicry-helper build found — portable exe would ship without it"
            exit 1
          fi
          gh run download "$run_id" --repo UniLinkIF/mimicry-helper -n mimicry-helper-exe -D app/src-tauri/target/release

      # cloudflared (remote access's tunnel, see app/src-tauri/src/remote.rs) — official,
      # permissively-licensed Cloudflare binary, fetched from their own GitHub releases at BUILD
      # time (a reviewable CI step under this repo's own control), not downloaded at runtime on
      # an end user's machine. Owner: "щоб людина реально скачала exe і більше нічого" — the
      # portable download should be genuinely self-contained.
      - name: Fetch cloudflared.exe from Cloudflare's official releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo cloudflare/cloudflared --pattern 'cloudflared-windows-amd64.exe' --output app/src-tauri/target/release/cloudflared.exe

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: RisenLab-windows
          path: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload portable exe (no installer)
        uses: actions/upload-artifact@v4
        with:
          name: RisenLab-portable
          path: |
            app/src-tauri/target/release/risenlab-ui.exe
            app/src-tauri/target/release/mimicry-helper.exe
            app/src-tauri/target/release/cloudflared.exe
          if-no-files-found: error

      # Actions artifacts (the upload above) need a GitHub login to download even on a public
      # repo — no good for "send a colleague a link". A Release asset is a plain public URL, no
      # auth needed. One ZIP with all three files at the top level — owner: "щоб людина могла
      # просто скачати архів, розпакувати його в любу папку і все працювало" — helper_exe_path()/
      # cloudflared_path() both resolve relative to wherever risenlab-ui.exe itself ends up, not
      # a hardcoded folder, so this works unzipped anywhere, not just the Desktop.
      - name: Package the portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          Copy-Item app/src-tauri/target/release/risenlab-ui.exe dist-release/RisenLab.exe
          Copy-Item app/src-tauri/target/release/mimicry-helper.exe dist-release/
          Copy-Item app/src-tauri/target/release/cloudflared.exe dist-release/
          Compress-Archive -Path dist-release/* -DestinationPath RisenLab-portable.zip -Force

      # Rolling "latest" release: the owner always shares the SAME link, this just keeps its
      # attached zip current on every build instead of piling up a new release per version.
      - name: Publish the portable zip to the "latest" release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest RisenLab-portable.zip \
            --title "RisenLab (portable, always up to date)" \
            --notes "Автоматична збірка з main (${{ github.sha }}). Розпакуй в будь-яку папку — RisenLab.exe, mimicry-helper.exe і cloudflared.exe вже разом. / Automated build from main. Unzip anywhere — RisenLab.exe, mimicry-helper.exe, and cloudflared.exe already travel together."
